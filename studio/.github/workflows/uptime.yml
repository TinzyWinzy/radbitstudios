name: Uptime Monitoring

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-production:
    name: Production Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Run Health Check
        run: node monitoring/health-check.js
        env:
          HEALTH_URL: https://radbitsmehub.co.zw/api/health
          TIMEOUT: 10000

  check-staging:
    name: Staging Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Run Health Check
        run: node monitoring/health-check.js
        env:
          HEALTH_URL: https://staging.radbitsmehub.co.zw/api/health
          TIMEOUT: 10000

  alert-on-failure:
    name: Alert on Failure
    needs: [check-production, check-staging]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Sentry Alert
        run: |
          curl -X POST "${{ secrets.SENTRY_DSN }}/envelope/" \
            -H "Content-Type: application/json" \
            -d '{
              "event_id": "'"$(uuidgen)"'",
              "level": "critical",
              "exception": {
                "values": [{
                  "type": "UptimeCheckFailed",
                  "value": "Health check failed for ${{ github.workflow }}"
                }]
              },
              "tags": {
                "environment": "production",
                "check": "uptime"
              }
            }'
