name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
  NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: studio/package-lock.json
      - run: npm ci
        working-directory: studio
      - run: npm run lint
        working-directory: studio
      - run: npm run typecheck
        working-directory: studio

  test:
    name: Tests
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: studio/package-lock.json
      - run: npm ci
        working-directory: studio
      - run: npm test
        working-directory: studio

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: studio/package-lock.json
      - run: npm ci
        working-directory: studio
      - run: npm run build
        working-directory: studio
      - name: Bundle analysis (on demand)
        if: github.ref == 'refs/heads/main' && vars.ANALYZE_BUNDLE == 'true'
        run: npm run analyze
        working-directory: studio
      - name: Upload Sentry source maps
        if: github.ref == 'refs/heads/main'
        run: |
          npx @sentry/wizard@latest -i nextjs -t ${{ secrets.SENTRY_AUTH_TOKEN }}
        working-directory: studio

  lighthouse:
    name: Lighthouse
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: studio/package-lock.json
      - run: npm ci
        working-directory: studio
      - name: Build for audit
        run: npm run build
        working-directory: studio
      - name: Run Lighthouse CI
        run: npx lhci autorun --config=.lighthouserc.json
        working-directory: studio
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
