name: Scrape Tenders

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force scrape (skip cache)"
        required: false
        default: "false"

jobs:
  scrape-tenders:
    name: Scrape Tender Sources
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Tender Scraper
        run: |
          curl -s -X POST "${{ secrets.APP_URL }}/api/scraper/tenders?force=${{ github.event.inputs.force == 'true' && 'true' || 'false' }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n"

  alert-on-failure:
    name: Alert on Failure
    needs: scrape-tenders
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Failure Alert
        run: |
          curl -X POST "${{ secrets.SENTRY_DSN }}/envelope/" \
            -H "Content-Type: application/json" \
            -d '{
              "event_id": "'"$(uuidgen)"'",
              "level": "error",
              "exception": {
                "values": [{
                  "type": "ScraperFailed",
                  "value": "Tender scraper failed at $(date -u)"
                }]
              },
              "tags": {
                "environment": "production",
                "scraper": "tenders"
              }
            }'
